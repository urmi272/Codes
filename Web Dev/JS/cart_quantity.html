<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Quantity</title>
</head>
<body>
    <button onclick="
    console.log(`Cart quantity: ${cartQuantity}`)
    ">Show Quantity</button>
    <button onclick="
    console.log('Added');
    cartQuantity++;
    ">Add to cart</button>
    <button onclick="
    console.log('2 item Added');
    cartQuantity += 2;
    ">+2</button>
    <button onclick="
    cartQuantity += 3;
    console.log('3 item Added');
    ">+3</button>
    <button onclick="
    cartQuantity = 0;
    console.log('Cart Reset');
    ">Reset Cart</button>

    <script>
        let cartQuantity = 0;
    </script>
</body>
</html>
