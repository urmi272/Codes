<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Practice</title>
</head>

<body style="
    height: 3000px;
    padding-top: 60px;
    padding-left: 80px;
    ">
    <div style="
        background-color: black; 
        color: white;
        position: fixed;
        top: 0;
        left: 0;
        right:0;
        height: 50px;
        z-index: 100;
    ">
        header</div>

    <div style="
        background-color: rgb(225, 238, 144);
        position: fixed;
        top: 50px;
        left: 0;
        bottom: 0;
        width: 70px;

    ">
        sidebar
            <div style="
                position: absolute;
                background-color: red;
                top: 0px;
                right: 0px;
            ">
                x
            </div>
    </div>

    <div style="
        position: absolute;
        background-color: lightgreen;
        top: 70px;
        right: 10px;
    ">
        Absolute
    </div>

    <div style="
        background-color: lightblue;
        height: 200px;
        width: 200px;
        position: static;
    ">
        div 1
    </div>
    <div style="
        background-color: lightpink;
        height: 200px;
        width: 200px;
        position: relative;
    ">
        div 2
        <div style="
            position: absolute;
            background-color:gray;
            bottom: 10px;
            right: 10px;
        ">
            5:00
        </div>
    </div>
</body>

</html>
