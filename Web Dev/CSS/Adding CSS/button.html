<style>
    .subscribe-button{
        background-color: rgb(200, 1, 1);
        color: white;
        border: none;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left: 8px;
        padding-right: 8px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        margin-left: 10px;
    }

    .subscribe-button:hover{
        opacity: 0.9;
    }
    
    .subscribe-button:active{
        background-color: rgb(240, 71, 71);
    }

    .join-button{
        background-color: white;
        color:rgb(27, 137, 188);
        border-color: rgb(27, 137, 188);
        border-style: solid;
        border-width: 1px;
        border-radius: 3px;
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 8px;
        padding-right: 8px;
        cursor: pointer;
        margin-right: 8px;
        transition: background-color 0.5s, color 0.5s;
    }

    .join-button:hover{
        background-color: rgb(27, 137, 188);
        color: white;
    }

    .join-button:active{
        background-color: rgb(27, 137, 188);
        color: white;
    }

    .tweet-button{
        background-color: rgb(31, 154, 211);
        color: white;
        border: none;
        height: 35px;
        width: 70px;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        transition: box-shadow 0.3s ease-in-out;
    }

    .tweet-button:hover{
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1);
    }

</style>

<button class="subscribe-button">

</button>

</button>
