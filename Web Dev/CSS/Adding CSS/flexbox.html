<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox practice</title>
</head>
<body>
    <div style="
    display: flex;
    flex-direction: row;
    ">
        <div style="
        background-color: lightblue;
        ">div 1 text</div>
        <div style="
        background-color: lightpink;
        ">div 2<p>text</p></div>
    </div>

    <div style="
    margin-top: 10px;
    display: flex;
    flex-direction: row;
    ">
        <div style="
        background-color: lightblue;
        width: 100px;
        ">100px</div>
        <div style="
        background-color: lightpink; 
        flex: 1;
        ">flex: 1</div>
    </div>

    <div style="
    margin-top: 10px;
    display: flex;
    flex-direction: row;
    ">
        <div style="
        background-color: lightblue;
        width: 100px;
        ">100px</div>
        <div style="
        background-color: lightpink; 
        flex: 1;
        ">flex: 1</div>
        <div style="
        background-color: lightblue;
        flex: 2;
        ">flex: 2</div>
    </div>

    <div style="
    margin-top: 10px;
    height: 80px;
    display: flex;
    flex-direction: row;
    border: 1px solid gray;
    justify-content: center; /* we have left right center space-between space-around */
    ">
        <div style="
        background-color: lightblue;
        width: 100px;
        ">100px</div>
        <div style="
        background-color: lightpink; 
        width: 100px;
        ">100px</div>
        <div style="
        background-color: lightblue;
        width: 100px;
        ">100px</div>
    </div>

    <div style="
    margin-top: 10px;
    height: 80px;
    display: flex;
    flex-direction: row;
    border: 1px solid gray;
    justify-content: space-between; /* we have left right center space-between space-around */
    ">
        <div style="
        background-color: lightblue;
        width: 100px;
        ">100px</div>
        <div style="
        background-color: lightpink; 
        width: 100px;
        ">100px</div>
        <div style="
        background-color: lightblue;
        width: 100px;
        ">100px</div>
    </div>

    <div style="
    margin-top: 10px;
    height: 80px;
    display: flex;
    flex-direction: row;
    border: 1px solid gray;
    justify-content: space-between; /* we have left right center space-between space-around */
    align-items: start;
    ">
        <div style="
        background-color: lightblue;
        width: 100px;
        ">100px</div>
        <div style="
        background-color: lightpink; 
        width: 100px;
        ">100px</div>
        <div style="
        background-color: lightblue;
        width: 100px;
        ">100px</div>
    </div>
</body>
</html>
